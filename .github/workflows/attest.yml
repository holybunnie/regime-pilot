name: hourly-attestation

# Commits one signal hash to BSC mainnet every hour, then pushes the public record and
# a chain-complete verification snapshot. The snapshot makes the checked-in
# attest/VERIFICATION.md follow the live contract without manual edits.
# Runs at HH:05 so the prior hour's data is settled and the commit lands within the
# signal's effective hour (a true forward prediction). Manual run also allowed.
on:
  schedule:
    # :23 — avoid the congested :00/:05 slots where GitHub delays/skips scheduled runs
    - cron: "23 * * * *"
  workflow_dispatch:

permissions:
  contents: write          # to push commits_public.csv / heartbeat back to the repo

concurrency:
  group: attestation       # never run two committers at once
  cancel-in-progress: false

jobs:
  commit-hour:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install web3==7.16.0 eth-account==0.13.7 pandas==2.2.3 numpy==2.1.3 pyarrow==18.1.0 requests==2.32.3

      - name: Commit hourly signal on-chain
        env:
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
          ATTEST_PRIVATE_KEY: ${{ secrets.ATTEST_PRIVATE_KEY }}
          ATTEST_SALT_SEED: ${{ secrets.ATTEST_SALT_SEED }}
        run: |
          export PYTHONPATH=.
          python attest/commit_hour.py

      - name: Push public attestation record
        if: always()        # push even if the commit step logged a MISSED slot
        run: |
          export PYTHONPATH=.
          if python attest/snapshot_ledger.py && python attest/verify.py --offline; then
            cp attest/VERIFICATION.md demo/attest__VERIFICATION.md
          fi
          git config user.name "holybunnie"
          git config user.email "melindacharles82@gmail.com"
          git add \
            attest/commits_public.csv \
            attest/heartbeat.txt \
            attest/missed.log \
            attest/onchain_ledger.json \
            attest/VERIFICATION.md \
            demo/attest__VERIFICATION.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Record hourly attestation $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true
